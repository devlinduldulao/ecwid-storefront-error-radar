<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Storefront Error Radar Listing Cover</title>
  <desc id="desc">Flat, simple and sophisticated marketplace cover art for the Ecwid diagnostics app.</desc>
  <rect width="1600" height="900" fill="#333333"/>
  
  <!-- Sleek Dashboard App Window -->
  <rect x="120" y="140" width="800" height="620" rx="16" fill="#f8f8f8"/>
  <rect x="120" y="140" width="800" height="60" rx="16" fill="#ffffff" stroke="#e0e0e0" stroke-width="2"/>
  <circle cx="150" cy="170" r="8" fill="#E02828"/>
  <circle cx="174" cy="170" r="8" fill="#e0e0e0"/>
  <circle cx="198" cy="170" r="8" fill="#e0e0e0"/>
  
  <!-- Dashboard Content Placeholders -->
  <rect x="160" y="240" width="220" height="100" rx="8" fill="#ffffff" stroke="#e0e0e0" stroke-width="2"/>
  <rect x="410" y="240" width="220" height="100" rx="8" fill="#ffffff" stroke="#e0e0e0" stroke-width="2"/>
  <rect x="660" y="240" width="220" height="100" rx="8" fill="#ffffff" stroke="#e0e0e0" stroke-width="2"/>
  <rect x="160" y="380" width="720" height="260" rx="8" fill="#ffffff" stroke="#e0e0e0" stroke-width="2"/>
  <rect x="190" y="420" width="660" height="24" rx="4" fill="#f0f0f0"/>
  <rect x="190" y="470" width="660" height="16" rx="4" fill="#f0f0f0"/>
  <rect x="190" y="510" width="660" height="16" rx="4" fill="#f0f0f0"/>
  <rect x="190" y="550" width="460" height="16" rx="4" fill="#f0f0f0"/>

  <!-- Radar Icon Abstract Element -->
  <circle cx="1300" cy="240" r="80" fill="none" stroke="#ffffff" stroke-width="12" opacity="0.1"/>
  <circle cx="1300" cy="240" r="140" fill="none" stroke="#ffffff" stroke-width="12" opacity="0.05"/>
  <circle cx="1300" cy="240" r="30" fill="none" stroke="#E02828" stroke-width="12"/>
  <path d="M1270 240 h60 M1300 210 v60" stroke="#E02828" stroke-width="8" stroke-linecap="round"/>

  <!-- Typography Element -->
  <text x="1000" y="440" fill="#ffffff" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="64" font-weight="700">Storefront Error Radar</text>
  <text x="1000" y="520" fill="#a0a0a0" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="32">Owner-only Ecwid diagnostics with</text>
  <text x="1000" y="570" fill="#a0a0a0" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="32">live preview and fake-data mode.</text>
  
  <!-- Call to action simple pill buttons -->
  <rect x="1000" y="660" width="220" height="64" rx="32" fill="#E02828"/>
  <text x="1110" y="702" fill="#ffffff" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="24" font-weight="600" text-anchor="middle">Demo Preview</text>

  <rect x="1260" y="660" width="220" height="64" rx="32" fill="none" stroke="#ffffff" stroke-width="4"/>
  <text x="1370" y="702" fill="#ffffff" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="24" font-weight="600" text-anchor="middle">JSON Export</text>
</svg>
