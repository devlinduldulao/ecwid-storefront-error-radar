<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">Storefront Error Radar Icon</title>
  <desc id="desc">Flat and simple diagnostics icon representing radar on a storefront.</desc>
  <rect width="512" height="512" rx="96" fill="#333333"/>
  
  <!-- Outer Storefront Shape (Simple Box with Roof) -->
  <path d="M116 220 V380 H396 V220 M96 220 L256 120 L416 220 Z" fill="none" stroke="#ffffff" stroke-width="24" stroke-linejoin="round"/>
  
  <!-- Inner Radar / Error Target -->
  <circle cx="256" cy="280" r="48" fill="none" stroke="#ffffff" stroke-width="16"/>
  <circle cx="256" cy="280" r="16" fill="#E02828"/>
  <path d="M256 190 v32 M256 338 v32 M166 280 h32 M314 280 h32" fill="none" stroke="#E02828" stroke-width="16" stroke-linecap="round"/>
</svg>
